<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Roboto Condensed',sans-serif; background:#0D0D0D; color:#fff; height:860px; overflow:hidden; }
  .neon { background:linear-gradient(100deg,#39FF14,#FF2D78,#39FF14); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:hue 7s linear infinite; }
  @keyframes hue { to { background-position:200% 0; } }
  nav { display:flex; align-items:center; justify-content:space-between; padding:24px 56px; position:relative; z-index:5; }
  .logo { font-family:'Anton'; font-size:26px; letter-spacing:1px; }
  .logo span { color:#39FF14; }
  .links { display:flex; gap:28px; font-size:15px; font-weight:700; letter-spacing:2px; color:#cfcfcf; text-transform:uppercase; }
  .btn-neon { padding:13px 26px; border-radius:6px; font-weight:700; font-size:14px; letter-spacing:2px; color:#0D0D0D; background:#39FF14; text-transform:uppercase; box-shadow:0 0 24px rgba(57,255,20,.4); }
  .hero { position:relative; height:760px; padding:0 56px; display:flex; flex-direction:column; justify-content:center; }
  .video { position:absolute; inset:0; background:radial-gradient(120% 100% at 75% 40%,#23232a,#0D0D0D 72%); }
  .video::before { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.015) 0 2px,transparent 2px 14px); }
  .video::after { content:''; position:absolute; right:6%; top:30%; width:380px; height:380px; background:radial-gradient(circle,rgba(57,255,20,.18),transparent 70%); filter:blur(20px); }
  .vlabel { position:absolute; top:24px; right:56px; z-index:6; font-size:12px; letter-spacing:2px; color:#888; border:1px solid #2c2c2c; padding:7px 14px; border-radius:4px; }
  .content { position:relative; z-index:4; max-width:900px; }
  .sticker { display:inline-block; transform:rotate(-3deg); background:#FF2D78; color:#fff; font-weight:700; letter-spacing:3px; font-size:12px; padding:6px 14px; border-radius:3px; text-transform:uppercase; }
  h1 { font-family:'Bebas Neue'; font-size:130px; line-height:.86; letter-spacing:2px; margin:18px 0 10px; }
  .sub { font-size:19px; color:#c2c2c2; max-width:560px; line-height:1.5; }
  .ctas { display:flex; gap:14px; margin-top:34px; align-items:center; }
  .btn2 { padding:14px 26px; border-radius:6px; border:2px solid #39FF14; color:#39FF14; font-weight:700; font-size:14px; letter-spacing:2px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="hero">
    <div class="video"></div>
    <div class="vlabel">▶ HERO-VIDEO FOLGT (VON DIR)</div>
    <nav>
      <div class="logo">GV<span>.</span>WERBETECHNIK</div>
      <div class="links"><span>Wraps</span><span>Styles</span><span>Gallery</span><span>Crew</span><span>Contact</span></div>
      <div class="btn-neon">Get Wrapped</div>
    </nav>
    <div class="content">
      <span class="sticker">Custom · Camo · Color-Shift</span>
      <h1>Stand out<br /><span class="neon">or stay home.</span></h1>
      <p class="sub">Custom Wraps, Camo &amp; Color-Shift – für alle, die in Münster auffallen wollen.</p>
      <div class="ctas">
        <div class="btn-neon" style="padding:15px 30px;">Get Wrapped</div>
        <div class="btn2">Gallery ↓</div>
      </div>
    </div>
  </div>
</body>
</html>
